<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人一世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

       
        .hero {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1e2937, #2c3e50);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            overflow: hidden;
        }

        
        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        
        .hero p {
            font-size: 20px;
            color: #ccc;
            max-width: 700px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

       
        .btn {
            padding: 14px 36px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-3px);
        }

        
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }
            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>欢迎来到我的网站</h1>
        <p>专注于分享各种内容</p>
        <a href="#content" class="btn">进入首页</a>
    </section>

</body>
</html>
