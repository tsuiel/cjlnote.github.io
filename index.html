<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #4a148c;
        }

        /* 紫色背景 + 圆点图案 */
        .hero {
            width: 100%;
            height: 100vh;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 1%, transparent 1%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 1%, transparent 1%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06) 1%, transparent 1%),
                radial-gradient(circle at 60% 10%, rgba(255,255,255,0.06) 1%, transparent 1%),
                linear-gradient(135deg, #5b21b6, #7c3aed, #8b5cf6);
            background-size: 100px 100px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 20px;
            color: #e9d8fd;
            max-width: 700px;
            line-height: 1.7;
            margin-bottom: 50px;
        }

        .btn-box {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 16px 42px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .btn:hover {
            background: #fff;
            color: #6d28d9;
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 34px;
            }
            .hero p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>我的个人主页</h1>
        <p>记录学习笔记，分享旅途风景</p>
        
        <div class="btn-box">
            <a href="notes/" class="btn">📝 学习笔记</a>
            <a href="travel/" class="btn">✈️ 旅行记录</a>
        </div>
    </section>

</body>
</html>
